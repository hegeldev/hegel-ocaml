name: CI (OxCaml)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: test (oxcaml)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just uv

      # OxCaml compiler + deps need more disk than ubuntu-latest provides by
      # default. Remove pre-installed Android SDK (~10GB) and .NET (~2.5GB).
      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet

      - name: Set up OxCaml
        uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            oxcaml: "git+https://github.com/oxcaml/opam-repository.git"
            default: "git+https://github.com/ocaml/opam-repository.git"
          opam-pin: false
          dune-cache: true

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes --ignore-constraints-on=ocamlformat

      - name: Run tests
        run: just check-tests

  conformance:
    name: conformance (oxcaml)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just uv

      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet

      - name: Set up OxCaml
        uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            oxcaml: "git+https://github.com/oxcaml/opam-repository.git"
            default: "git+https://github.com/ocaml/opam-repository.git"
          opam-pin: false
          dune-cache: true

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes --ignore-constraints-on=ocamlformat

      - name: Run conformance tests
        run: just check-conformance

  docs:
    name: docs (oxcaml)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet

      - name: Set up OxCaml
        uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            oxcaml: "git+https://github.com/oxcaml/opam-repository.git"
            default: "git+https://github.com/ocaml/opam-repository.git"
          opam-pin: false
          dune-cache: true

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-doc --yes

      - name: Check docs
        run: just check-docs
