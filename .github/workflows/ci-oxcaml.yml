name: CI (OxCaml)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: test (oxcaml)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just uv

      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet

      - name: Set up OxCaml
        uses: ocaml/setup-ocaml@fefd9c240b9d934d5d25aa9c2a8caae6c7b40079 # v3.6.0
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            oxcaml: "git+https://github.com/oxcaml/opam-repository.git"
            default: "git+https://github.com/ocaml/opam-repository.git"
          opam-pin: false
          dune-cache: true
          allow-prerelease-opam: true

      - name: Install OCaml dependencies
        run: |
          opam install . --deps-only --yes
          opam install alcotest --yes

      - name: Run tests
        run: just check-tests-no-coverage

  conformance:
    name: conformance (oxcaml)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just uv

      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet

      - name: Set up OxCaml
        uses: ocaml/setup-ocaml@fefd9c240b9d934d5d25aa9c2a8caae6c7b40079 # v3.6.0
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            oxcaml: "git+https://github.com/oxcaml/opam-repository.git"
            default: "git+https://github.com/ocaml/opam-repository.git"
          opam-pin: false
          dune-cache: true
          allow-prerelease-opam: true

      - name: Install OCaml dependencies
        run: opam install . --deps-only --yes

      - name: Run conformance tests
        run: just check-conformance

  docs:
    name: docs (oxcaml)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Free disk space
        run: sudo rm -rf /usr/local/lib/android /usr/share/dotnet

      - name: Set up OxCaml
        uses: ocaml/setup-ocaml@fefd9c240b9d934d5d25aa9c2a8caae6c7b40079 # v3.6.0
        with:
          ocaml-compiler: ocaml-variants.5.2.0+ox
          opam-repositories: |
            oxcaml: "git+https://github.com/oxcaml/opam-repository.git"
            default: "git+https://github.com/ocaml/opam-repository.git"
          opam-pin: false
          dune-cache: true
          allow-prerelease-opam: true

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-doc --yes

      - name: Check docs
        run: just check-docs
