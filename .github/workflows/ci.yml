name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Install opam
        run: |
          OPAM_VERSION="2.2.1"
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
          opam --version

      - name: Cache opam
        id: cache-opam
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-lint-${{ hashFiles('*.opam', '.ocamlformat') }}
          restore-keys: |
            opam-${{ runner.os }}-lint-

      - name: Set up OCaml
        if: steps.cache-opam.outputs.cache-hit != 'true'
        run: |
          # Cache may be partially restored via restore-keys (a different key
          # prefix matched); guard each step so it's idempotent.
          if [ ! -d "$HOME/.opam" ]; then
            opam init --disable-sandboxing --yes
          fi
          if ! opam switch list --short 2>/dev/null | grep -q '^5.2.1$'; then
            opam switch create 5.2.1 --yes
          fi

      - name: Set opam environment
        run: |
          echo "$HOME/.opam/5.2.1/bin" >> $GITHUB_PATH
          echo "OPAMSWITCH=5.2.1" >> $GITHUB_ENV

      - name: Install OCaml dependencies
        run: |
          eval $(opam env)
          opam install . --deps-only --yes

      - name: Install ocamlformat
        run: |
          eval $(opam env)
          opam install ocamlformat.0.29.0 --yes

      - name: Check formatting
        run: just check-format

      - name: Check opam files are up to date
        run: |
          eval $(opam env)
          opam exec -- dune build hegel.opam && git diff --exit-code '*.opam'

      - name: Check zizmor
        run: |
          pipx install zizmor==1.23.1
          zizmor --format plain .github/

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Install opam
        run: |
          OPAM_VERSION="2.2.1"
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
          opam --version

      - name: Cache opam
        id: cache-opam
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-with-test-${{ hashFiles('*.opam') }}
          restore-keys: |
            opam-${{ runner.os }}-with-test-

      - name: Set up OCaml
        if: steps.cache-opam.outputs.cache-hit != 'true'
        run: |
          # Cache may be partially restored via restore-keys (a different key
          # prefix matched); guard each step so it's idempotent.
          if [ ! -d "$HOME/.opam" ]; then
            opam init --disable-sandboxing --yes
          fi
          if ! opam switch list --short 2>/dev/null | grep -q '^5.2.1$'; then
            opam switch create 5.2.1 --yes
          fi

      - name: Set opam environment
        run: |
          echo "$HOME/.opam/5.2.1/bin" >> $GITHUB_PATH
          echo "OPAMSWITCH=5.2.1" >> $GITHUB_ENV

      - name: Install OCaml dependencies
        run: |
          eval $(opam env)
          opam install . --deps-only --with-test --yes

      - name: Stage libhegel from the matching GitHub release
        id: libhegel
        run: |
          VERSION=$(awk -F'"' '/let version =/{print $2}' lib/ffi/loader.ml)
          ASSET="libhegel-linux-amd64.so"
          URL_BASE="https://github.com/hegeldev/hegel-rust/releases/download/v${VERSION}"
          DEST="${RUNNER_TEMP}/libhegel.so"
          curl -fsSL -o "${DEST}" "${URL_BASE}/${ASSET}"
          curl -fsSL -o "${DEST}.sha256" "${URL_BASE}/${ASSET}.sha256"
          WANT=$(awk '{print $1}' "${DEST}.sha256")
          echo "${WANT}  ${DEST}" | sha256sum -c -
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        env:
          HEGEL_LIBHEGEL_PATH: ${{ steps.libhegel.outputs.path }}
        run: just check-tests

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Install opam
        run: |
          OPAM_VERSION="2.2.1"
          curl -fsSL \
            "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-x86_64-linux" \
            -o /usr/local/bin/opam
          chmod +x /usr/local/bin/opam
          opam --version

      - name: Cache opam
        id: cache-opam
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.opam
          key: opam-${{ runner.os }}-with-doc-${{ hashFiles('*.opam') }}
          restore-keys: |
            opam-${{ runner.os }}-with-doc-

      - name: Set up OCaml
        if: steps.cache-opam.outputs.cache-hit != 'true'
        run: |
          # Cache may be partially restored via restore-keys (a different key
          # prefix matched); guard each step so it's idempotent.
          if [ ! -d "$HOME/.opam" ]; then
            opam init --disable-sandboxing --yes
          fi
          if ! opam switch list --short 2>/dev/null | grep -q '^5.2.1$'; then
            opam switch create 5.2.1 --yes
          fi

      - name: Set opam environment
        run: |
          echo "$HOME/.opam/5.2.1/bin" >> $GITHUB_PATH
          echo "OPAMSWITCH=5.2.1" >> $GITHUB_ENV

      - name: Install OCaml dependencies
        run: |
          eval $(opam env)
          opam install . --deps-only --with-doc --yes

      - name: Check docs
        run: just check-docs

  nix:
    name: nix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: lint
        run: just check-format-nix

  # Cross-platform compatibility check: build and run the suite on macOS
  # against the matching libhegel artifact. The job stages the release asset
  # and points the loader at it via HEGEL_LIBHEGEL_PATH (so the loader does not
  # need to download or verify checksums on the runner).
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: libhegel-darwin-arm64.dylib
            libname: libhegel.dylib
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ocaml/setup-ocaml@e32b06a3e831ff2fbc6f08cf35be2085e3918014 # v3
        with:
          ocaml-compiler: "5.2"

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes

      - name: Stage libhegel from the matching GitHub release
        id: libhegel
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
          LIBNAME: ${{ matrix.libname }}
        run: |
          VERSION=$(awk -F'"' '/let version =/{print $2}' lib/ffi/loader.ml)
          URL_BASE="https://github.com/hegeldev/hegel-rust/releases/download/v${VERSION}"
          DEST="${RUNNER_TEMP}/${LIBNAME}"
          curl -fsSL -o "${DEST}" "${URL_BASE}/${ASSET}"
          curl -fsSL -o "${DEST}.sha256" "${URL_BASE}/${ASSET}.sha256"
          WANT=$(awk '{print $1}' "${DEST}.sha256")
          if command -v sha256sum >/dev/null 2>&1; then
            echo "${WANT}  ${DEST}" | sha256sum -c -
          else
            echo "${WANT}  ${DEST}" | shasum -a 256 -c -
          fi
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        shell: bash
        env:
          HEGEL_LIBHEGEL_PATH: ${{ steps.libhegel.outputs.path }}
        run: opam exec -- dune runtest

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-ocaml'
    needs: [lint, test, docs, nix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release
