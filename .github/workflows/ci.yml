name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # necessary to read the actions cache, where we put the dune builds in for fast ci
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        with:
          ocaml-compiler: 5.2.1
          dune-cache: true

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Install ocamlformat
        run: opam install ocamlformat.0.28.1

      - name: Check formatting
        run: just check-format

      - name: Check opam files are up to date
        run: opam exec -- dune build hegel.opam && git diff --exit-code '*.opam'

      - name: Check zizmor
        run: |
          pipx install zizmor==1.23.1
          zizmor --format plain .github/

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just uv

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        with:
          ocaml-compiler: 5.2.1
          dune-cache: true

      - name: Cache opam dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _opam
          key: opam-${{ runner.os }}-with-test-${{ hashFiles('*.opam') }}
          restore-keys: |
            opam-${{ runner.os }}-with-test-

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes

      - name: Run tests
        run: just check-tests

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        with:
          ocaml-compiler: 5.2.1
          dune-cache: true

      - name: Cache opam dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _opam
          key: opam-${{ runner.os }}-with-doc-${{ hashFiles('*.opam') }}
          restore-keys: |
            opam-${{ runner.os }}-with-doc-

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-doc --yes

      - name: Check docs
        run: just check-docs

  conformance:
    name: conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just uv

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@dec6499fef64fc5d7ed43d43a87251b7b1c306f5 # v3
        with:
          ocaml-compiler: 5.2.1
          dune-cache: true

      - name: Cache opam dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: _opam
          key: opam-${{ runner.os }}-with-test-${{ hashFiles('*.opam') }}
          restore-keys: |
            opam-${{ runner.os }}-with-test-

      - name: Install OCaml dependencies
        run: opam install . --deps-only --with-test --yes

      - name: Run conformance tests
        run: just check-conformance

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-ocaml'
    needs: [lint, test, docs, conformance]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release
