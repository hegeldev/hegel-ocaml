name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - uses: ./.github/actions/setup-opam
        with:
          cache-key: opam-${{ runner.os }}-lint-${{ hashFiles('*.opam', '.ocamlformat') }}
          cache-restore-keys: |
            opam-${{ runner.os }}-lint-

      - name: Install ocamlformat
        run: |
          eval $(opam env)
          opam install ocamlformat.0.29.0 --yes

      - name: Check formatting
        run: just check-format

      - name: Check opam files are up to date
        run: |
          eval $(opam env)
          opam exec -- dune build ./*.opam && git diff --exit-code '*.opam'

      - name: Lint opam metadata
        run: |
          eval $(opam env)
          opam lint ./*.opam

      - name: Check zizmor
        run: |
          pipx install zizmor==1.23.1
          zizmor --format plain .github/

  compat:
    name: compat (ocaml ${{ matrix.ocaml }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        ocaml: ["5.1.1", "5.4.1"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - uses: ./.github/actions/setup-opam
        with:
          ocaml-version: ${{ matrix.ocaml }}
          # The OCaml version is part of the cache key so the matrix legs don't
          # share (and clobber) one ~/.opam.
          cache-key: opam-${{ runner.os }}-${{ matrix.ocaml }}-with-test-${{ hashFiles('*.opam') }}
          cache-restore-keys: |
            opam-${{ runner.os }}-${{ matrix.ocaml }}-with-test-
          deps-flags: --with-test

      - name: Stage libhegel from the matching GitHub release
        id: libhegel
        run: |
          VERSION=$(awk -F'"' '/let version =/{print $2}' lib/ffi/loader.ml)
          ASSET="libhegel-linux-amd64.so"
          URL_BASE="https://github.com/hegeldev/hegel-rust/releases/download/v${VERSION}"
          DEST="${RUNNER_TEMP}/libhegel.so"
          curl -fsSL -o "${DEST}" "${URL_BASE}/${ASSET}"
          curl -fsSL -o "${DEST}.sha256" "${URL_BASE}/${ASSET}.sha256"
          WANT=$(awk '{print $1}' "${DEST}.sha256")
          echo "${WANT}  ${DEST}" | sha256sum -c -
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Run tests (no coverage)
        env:
          HEGEL_LIBHEGEL_PATH: ${{ steps.libhegel.outputs.path }}
        run: just check-tests-no-coverage

      - name: Mirror opam-repo-ci (isolated release build + tests)
        run: |
          eval $(opam env)
          opam install ./*.opam --with-test --confirm-level=unsafe-yes

  test:
    name: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - uses: ./.github/actions/setup-opam
        with:
          cache-key: opam-${{ runner.os }}-with-test-${{ hashFiles('*.opam') }}
          cache-restore-keys: |
            opam-${{ runner.os }}-with-test-
          deps-flags: --with-test

      - name: Install bisect_ppx
        run: |
          eval $(opam env)
          opam install bisect_ppx.2.8.3 --yes

      - name: Stage libhegel from the matching GitHub release
        id: libhegel
        run: |
          VERSION=$(awk -F'"' '/let version =/{print $2}' lib/ffi/loader.ml)
          ASSET="libhegel-linux-amd64.so"
          URL_BASE="https://github.com/hegeldev/hegel-rust/releases/download/v${VERSION}"
          DEST="${RUNNER_TEMP}/libhegel.so"
          curl -fsSL -o "${DEST}" "${URL_BASE}/${ASSET}"
          curl -fsSL -o "${DEST}.sha256" "${URL_BASE}/${ASSET}.sha256"
          WANT=$(awk '{print $1}' "${DEST}.sha256")
          echo "${WANT}  ${DEST}" | sha256sum -c -
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Run tests with coverage
        env:
          HEGEL_LIBHEGEL_PATH: ${{ steps.libhegel.outputs.path }}
        run: just check-tests

      - name: Mirror opam-repo-ci (isolated release build + tests)
        run: |
          eval $(opam env)
          opam install ./*.opam --with-test --confirm-level=unsafe-yes

  docs:
    name: docs
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - uses: ./.github/actions/setup-opam
        with:
          cache-key: opam-${{ runner.os }}-with-doc-${{ hashFiles('*.opam') }}
          cache-restore-keys: |
            opam-${{ runner.os }}-with-doc-
          deps-flags: --with-doc

      - name: Check docs
        run: just check-docs

  nix:
    name: nix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: cachix/install-nix-action@1ca7d21a94afc7c957383a2d217460d980de4934 # v31.10.1

      - uses: ./.github/actions/install-tools
        with:
          tools: just

      - name: lint
        run: just check-format-nix

  # Cross-platform compatibility check: build and run the suite on macOS
  # against the matching libhegel artifact. The job stages the release asset
  # and points the loader at it via HEGEL_LIBHEGEL_PATH (so the loader does not
  # need to download or verify checksums on the runner).
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            asset: libhegel-darwin-arm64.dylib
            libname: libhegel.dylib
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - uses: ./.github/actions/setup-opam
        with:
          cache-key: opam-${{ runner.os }}-smoke-${{ hashFiles('*.opam') }}
          cache-restore-keys: |
            opam-${{ runner.os }}-smoke-
          deps-flags: --with-test
          bare: "true"

      - name: Stage libhegel from the matching GitHub release
        id: libhegel
        shell: bash
        env:
          ASSET: ${{ matrix.asset }}
          LIBNAME: ${{ matrix.libname }}
        run: |
          VERSION=$(awk -F'"' '/let version =/{print $2}' lib/ffi/loader.ml)
          URL_BASE="https://github.com/hegeldev/hegel-rust/releases/download/v${VERSION}"
          DEST="${RUNNER_TEMP}/${LIBNAME}"
          curl -fsSL -o "${DEST}" "${URL_BASE}/${ASSET}"
          curl -fsSL -o "${DEST}.sha256" "${URL_BASE}/${ASSET}.sha256"
          WANT=$(awk '{print $1}' "${DEST}.sha256")
          if command -v sha256sum >/dev/null 2>&1; then
            echo "${WANT}  ${DEST}" | sha256sum -c -
          else
            echo "${WANT}  ${DEST}" | shasum -a 256 -c -
          fi
          echo "path=${DEST}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        shell: bash
        env:
          HEGEL_LIBHEGEL_PATH: ${{ steps.libhegel.outputs.path }}
        run: opam exec -- dune runtest

  release:
    name: release
    if: github.event_name == 'push' && github.repository == 'hegeldev/hegel-ocaml'
    needs: [lint, test, compat, docs, nix]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Check for RELEASE.md
        id: check
        run: |
          if [ ! -f RELEASE.md ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate app token
        if: steps.check.outputs.skip != 'true'
        uses: actions/create-github-app-token@d72941d797fd3113feb6b93fd0dec494b13a2547 # v1
        id: app-token
        with:
          app-id: ${{ vars.HEGEL_RELEASE_APP_ID }}
          private-key: ${{ secrets.HEGEL_RELEASE_APP_PRIVATE_KEY }}

      - name: Re-checkout with app token # zizmor: ignore[artipacked]
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          HEGEL_RELEASE_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: python .github/scripts/release.py release
