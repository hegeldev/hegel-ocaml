name: Set up opam
description: Install opam, restore/save the opam cache, create the requested OCaml switch, and install dependencies.
inputs:
  ocaml-version:
    description: OCaml compiler version to create the switch for (also used as the switch name).
    required: false
    default: "5.2.1"
  cache-key:
    description: Full key for the opam cache (e.g. opam-Linux-lint-<hash>).
    required: true
  cache-restore-keys:
    description: Newline-separated restore-keys prefix for the opam cache.
    required: true
  deps-flags:
    description: Extra flags passed to `opam install . --deps-only` (e.g. --with-test).
    required: false
    default: ""
  bare:
    description: Initialize opam with --bare (skips creating a default switch).
    required: false
    default: "false"
runs:
  using: composite
  steps:
    - name: Install opam
      shell: bash
      run: | # zizmor: ignore[github-env] static PATH entry, no untrusted input
        OPAM_VERSION="2.2.1"
        ARCH=$(uname -m)
        case "$RUNNER_OS" in
          Linux)
            curl -fsSL \
              "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-x86_64-linux" \
              -o /usr/local/bin/opam
            chmod +x /usr/local/bin/opam
            ;;
          macOS)
            mkdir -p "$HOME/.local/bin"
            curl -fsSL \
              "https://github.com/ocaml/opam/releases/download/${OPAM_VERSION}/opam-${OPAM_VERSION}-${ARCH}-macos" \
              -o "$HOME/.local/bin/opam"
            chmod +x "$HOME/.local/bin/opam"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            ;;
          *)
            echo "::error::Unsupported runner OS: $RUNNER_OS"; exit 1 ;;
        esac
        opam --version

    - name: Cache opam
      id: cache-opam
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.opam
        key: ${{ inputs.cache-key }}
        restore-keys: ${{ inputs.cache-restore-keys }}

    - name: Set up OCaml
      if: steps.cache-opam.outputs.cache-hit != 'true'
      shell: bash
      env:
        BARE: ${{ inputs.bare }}
        OCAML_VERSION: ${{ inputs.ocaml-version }}
      run: |
        # Cache may be partially restored via restore-keys (a different key
        # prefix matched); guard each step so it's idempotent.
        if [ ! -d "$HOME/.opam" ]; then
          if [ "$BARE" = "true" ]; then
            opam init --bare --disable-sandboxing --yes
          else
            opam init --disable-sandboxing --yes
          fi
        fi
        if ! opam switch list --short 2>/dev/null | grep -q "^${OCAML_VERSION}$"; then
          opam switch create "$OCAML_VERSION" --yes
        fi

    - name: Set opam environment
      shell: bash
      env:
        OCAML_VERSION: ${{ inputs.ocaml-version }}
      run: | # zizmor: ignore[github-env] static PATH/switch values, no untrusted input
        echo "$HOME/.opam/${OCAML_VERSION}/bin" >> $GITHUB_PATH
        echo "OPAMSWITCH=${OCAML_VERSION}" >> $GITHUB_ENV

    - name: Ensure GNU patch on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: | # zizmor: ignore[github-env] static PATH entry, no untrusted input
        # Some Jane Street packages (e.g. gel, a transitive dep of core) apply a
        # source patch at build time. macOS ships BSD patch, which silently
        # mis-applies these, leaving dangling references and failures like
        # "Bin_prot.Shape.Location ... which is missing". Install GNU patch and
        # put it ahead of BSD patch on PATH so opam builds patch correctly.
        brew install gpatch
        echo "$(brew --prefix gpatch)/libexec/gnubin" >> "$GITHUB_PATH"

    - name: Install OCaml dependencies
      shell: bash
      env:
        DEPS_FLAGS: ${{ inputs.deps-flags }}
      run: |
        eval $(opam env)
        # --confirm-level=unsafe-yes lets opam run the system package manager
        # (e.g. brew on macOS, to install libffi for ctypes) non-interactively;
        # plain --yes refuses to invoke it and aborts with exit 10. It implies
        # "yes", so --yes is dropped. No-op when no depexts are missing (Linux).
        opam install . --deps-only $DEPS_FLAGS --confirm-level=unsafe-yes
